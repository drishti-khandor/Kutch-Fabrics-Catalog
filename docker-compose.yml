version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: catalog_db
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - catalog-net

  backend:
    build: ./backend
    container_name: catalog_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://catalog_user:catalog_pass@postgres:5432/catalog
      CATALOG_DATA_PATH: /catalog_data
    volumes:
      - ./catalog_data:/catalog_data
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - catalog-net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: catalog_frontend
    environment:
      NEXT_PUBLIC_API_URL: ""
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - catalog-net

volumes:
  postgres_data:

networks:
  catalog-net:
    driver: bridge
